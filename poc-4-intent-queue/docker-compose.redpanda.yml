services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.1
    container_name: redpanda
    command: redpanda start --overprovisioned --smp 4 --memory 4G \
      --node-id 0 --check=false \
      --kafka-addr PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:9093 \
      --advertise-kafka-addr redpanda:9092
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      - REDPANDA_ADMIN_API_AUTHENTICATION_DISABLED=true
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:9644/v1/status/ready"]
      interval: 5s
      timeout: 3s
      retries: 5
